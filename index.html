<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Acuff Analytics LLC provides simple, secure, and insightful data analytics solutions for businesses and nonprofits."
  />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@300;400;500&display=swap"

  />

  <style>
    :root {
      --color-slate-blue: #5a6a87;
      --color-charcoal: #2f3640;
      --color-soft-white: #f7f8fa;
      --color-muted-teal: #6fa7a2;
      --color-graphite: #8c95a1;
      --max-width: 1100px;

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Roboto", system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background-color: var(--color-soft-white);
      color: var(--color-charcoal);
      line-height: 1.6;
    }
