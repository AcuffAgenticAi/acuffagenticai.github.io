name: Run Attribution Agent

on:
  push:
    paths:
      - 'sales/marketing_data.csv'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to save the image to your repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r sales/requirements.txt

      - name: Run Agent
        run: |
          python sales/run_agent.py

      - name: Commit and Push Chart
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sales/roas_report.png
          git commit -m "Auto-update: Marketing ROAS Report" || exit 0
          git push
